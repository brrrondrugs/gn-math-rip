name: Sync GN Math Zone Mirror

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Mirror zones, covers, and html
        run: |
          node <<'EOF'
          const fs = require('node:fs');
          const path = require('node:path');

          const outRoot = path.join(process.cwd(), 'mirror');
          const outZones = path.join(outRoot, 'zones');
          const outCovers = path.join(outRoot, 'covers');
          const outHtml = path.join(outRoot, 'html');

          for (const dir of [outRoot, outZones, outCovers, outHtml]) {
            fs.mkdirSync(dir, { recursive: true });
          }

          const zonesurls = [
            'https://cdn.jsdelivr.net/%67%68/%67%6e%2d%6d%61%74%68/%61%73%73%65%74%73@%6d%61%69%6e/%7a%6f%6e%65%73%2e%6a%73%6f%6e',
            'https://cdn.jsdelivr.net/gh/gn-math/assets@latest/zones.json',
            'https://cdn.jsdelivr.net/gh/gn-math/assets@master/zones.json',
            'https://cdn.jsdelivr.net/gh/gn-math/assets/zones.json'
          ];

          const coverURL = 'https://cdn.jsdelivr.net/gh/gn-math/covers@main';
          const htmlURL = 'https://cdn.jsdelivr.net/gh/gn-math/html@main';

          async function fetchText(url) {
            const res = await fetch(url, {
              headers: { 'user-agent': 'zones-mirror-bot' }
            });
            if (!res.ok) throw new Error(`HTTP ${res.status} for ${url}`);
            return res.text();
          }

          async function fetchBuffer(url) {
            const res = await fetch(url, {
              headers: { 'user-agent': 'zones-mirror-bot' }
            });
            if (!res.ok) throw new Error(`HTTP ${res.status} for ${url}`);
            const ab = await res.arrayBuffer();
            return Buffer.from(ab);
          }

          function extFromUrl(url, fallback = '.bin') {
            const clean = url.split('?')[0].split('#')[0];
            const ext = path.extname(clean);
            return ext || fallback;
          }

          function zoneUrl(url) {
            return String(url || '')
              .replaceAll('{COVER_URL}', coverURL)
              .replaceAll('{HTML_URL}', htmlURL);
          }

          async function getZonesUrl() {
            let chosen = zonesurls[Math.floor(Math.random() * zonesurls.length)];

            try {
              const commits = await fetch('https://api.github.com/repos/gn-math/assets/commits?t=' + Date.now(), {
                headers: { 'user-agent': 'zones-mirror-bot' }
              });
              if (commits.ok) {
                const json = await commits.json();
                const sha = json?.[0]?.sha;
                if (sha) {
                  chosen = `https://cdn.jsdelivr.net/gh/gn-math/assets@${sha}/zones.json`;
                }
              }
            } catch (_) {}

            return chosen;
          }

          (async () => {
            const usedZonesUrl = await getZonesUrl();
            const zonesRaw = await fetchText(usedZonesUrl + '?t=' + Date.now());
            const zones = JSON.parse(zonesRaw);

            fs.writeFileSync(path.join(outZones, 'zones.json'), JSON.stringify(zones, null, 2));

            const manifest = {
              generatedAt: new Date().toISOString(),
              source: usedZonesUrl,
              coverURL,
              htmlURL,
              total: zones.length,
              downloaded: { covers: 0, html: 0, external: 0, errors: [] }
            };

            for (const zone of zones) {
              const id = String(zone.id ?? 'unknown');

              try {
                if (zone.cover) {
                  const cover = zoneUrl(zone.cover);
                  const coverBuf = await fetchBuffer(cover + (cover.includes('?') ? '&' : '?') + 't=' + Date.now());
                  const coverExt = extFromUrl(cover, '.img');
                  fs.writeFileSync(path.join(outCovers, `${id}${coverExt}`), coverBuf);
                  manifest.downloaded.covers += 1;
                }
              } catch (err) {
                manifest.downloaded.errors.push({ id, type: 'cover', message: String(err?.message || err) });
              }

              try {
                if (zone.url) {
                  const resolved = zoneUrl(zone.url);
                  const isExternal = /^https?:\/\//i.test(zone.url);
                  const body = await fetchText(resolved + (resolved.includes('?') ? '&' : '?') + 't=' + Date.now());

                  if (isExternal) {
                    fs.writeFileSync(path.join(outHtml, `${id}.external.html`), body);
                    manifest.downloaded.external += 1;
                  } else {
                    fs.writeFileSync(path.join(outHtml, `${id}.html`), body);
                    manifest.downloaded.html += 1;
                  }
                }
              } catch (err) {
                manifest.downloaded.errors.push({ id, type: 'html', message: String(err?.message || err) });
              }
            }

            fs.writeFileSync(path.join(outRoot, 'manifest.json'), JSON.stringify(manifest, null, 2));
            console.log(`Mirrored ${zones.length} zones`);
            console.log(JSON.stringify(manifest.downloaded, null, 2));
          })().catch((err) => {
            console.error(err);
            process.exit(1);
          });
          EOF

      - name: Commit and push
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git add mirror
          if git diff --cached --quiet; then
            echo "No staged changes"
            exit 0
          fi
          git commit -m "chore: sync GN Math zone mirror"
          git push