``
name: Sync GN Math Zone Mirror

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run mirror script
        run: |
          node <<'EOF'
          const fs = require('node:fs');
          const path = require('node:path');

          const outRoot = path.join(process.cwd(), 'mirror');
          const outGames = path.join(outRoot, 'games');

          fs.mkdirSync(outGames, { recursive: true });

          // ✅ ONLY YOUR VALID SOURCES
          const zonesurls = [
            'https://cdn.jsdelivr.net/gh/sealiee11/gnmathstuff@main/zones.json',
            'https://cdn.jsdelivr.net/gh/freebuisness/assets@7d93fef0df44ed8ba3bc6be25549eac274aac47e/zones.json'
          ];

          const coverURL = 'https://cdn.jsdelivr.net/gh/freebuisness/covers@main';
          const htmlURL = 'https://cdn.jsdelivr.net/gh/freebuisness/html@main';

          async function fetchText(url) {
            const res = await fetch(url, { headers: { 'user-agent': 'mirror-bot' } });
            if (!res.ok) throw new Error(`HTTP ${res.status} for ${url}`);
            return res.text();
          }

          async function fetchBuffer(url) {
            const res = await fetch(url, { headers: { 'user-agent': 'mirror-bot' } });
            if (!res.ok) throw new Error(`HTTP ${res.status} for ${url}`);
            const ab = await res.arrayBuffer();
            return Buffer.from(ab);
          }

          function extFromUrl(url, fallback = '.bin') {
            const clean = url.split('?')[0].split('#')[0];
            const ext = path.extname(clean);
            return ext || fallback;
          }

          function zoneUrl(url) {
            return String(url || '')
              .replaceAll('{COVER_URL}', coverURL)
              .replaceAll('{HTML_URL}', htmlURL);
          }

          (async () => {
            // pick one randomly from your valid list
            const usedZonesUrl = zonesurls[Math.floor(Math.random() * zonesurls.length)];

            const zonesRaw = await fetchText(usedZonesUrl + '?t=' + Date.now());
            const zones = JSON.parse(zonesRaw);

            const manifest = {
              generatedAt: new Date().toISOString(),
              source: usedZonesUrl,
              total: zones.length,
              downloaded: { games: 0, errors: [] }
            };

            const index = [];

            for (const zone of zones) {
              const id = String(zone.id ?? 'unknown');
              const gameDir = path.join(outGames, id);
              fs.mkdirSync(gameDir, { recursive: true });

              try {
                // COVER
                if (zone.cover) {
                  const cover = zoneUrl(zone.cover);
                  const buf = await fetchBuffer(cover + '?t=' + Date.now());
                  const ext = extFromUrl(cover, '.img');

                  const name = `cover${ext}`;
                  fs.writeFileSync(path.join(gameDir, name), buf);

                  zone.localCover = name;
                }

                // HTML
                if (zone.url) {
                  const resolved = zoneUrl(zone.url);
                  const html = await fetchText(resolved + '?t=' + Date.now());

                  fs.writeFileSync(path.join(gameDir, 'index.html'), html);

                  zone.localHtml = 'index.html';
                }

                // GAME JSON
                fs.writeFileSync(
                  path.join(gameDir, 'game.json'),
                  JSON.stringify(zone, null, 2)
                );

                index.push({
                  id,
                  name: zone.name || 'unknown',
                  folder: `games/${id}`
                });

                manifest.downloaded.games++;

              } catch (err) {
                manifest.downloaded.errors.push({
                  id,
                  message: String(err?.message || err)
                });
              }
            }

            // GLOBAL FILES
            fs.writeFileSync(
              path.join(outRoot, 'zones.json'),
              JSON.stringify(zones, null, 2)
            );

            fs.writeFileSync(
              path.join(outRoot, 'index.json'),
              JSON.stringify(index, null, 2)
            );

            fs.writeFileSync(
              path.join(outRoot, 'manifest.json'),
              JSON.stringify(manifest, null, 2)
            );

            console.log(`Mirrored ${zones.length} games`);
          })().catch(err => {
            console.error(err);
            process.exit(1);
          });
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add mirror

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: sync game mirror"
          git push
